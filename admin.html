<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB Jewels - Admin Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant:wght@500;600&family=Montserrat:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen active">
        <div class="login-box">
            <h2>MB Jewels Admin</h2>
            <p>Please log in to manage your collections.</p>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
                <p id="login-error" class="error-msg"></p>
            </form>
        </div>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboard-screen" class="screen">
        <nav class="admin-nav">
            <h2>MB Jewels Admin</h2>
            <div class="nav-actions">
                <button id="seed-btn" class="btn btn-outline" style="margin-right: 10px;">Load Mock Data</button>
                <button id="logout-btn" class="btn btn-outline">Logout</button>
            </div>
        </nav>

        <main class="dashboard-container">
            <!-- ADD PRODUCT FORM -->
            <section class="admin-section">
                <h3>Add New Product</h3>
                <form id="add-product-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Product Name</label>
                            <input type="text" id="prod-name" placeholder="e.g. Lakshmi Necklace" required>
                        </div>
                        <div class="form-group">
                            <label>Price (₹)</label>
                            <input type="number" id="prod-price" placeholder="e.g. 4500" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Category</label>
                            <select id="prod-category">
                                <option value="necklaces">Necklace</option>
                                <option value="earrings">Earrings</option>
                                <option value="bangles">Bangles</option>
                                <option value="maangtikka">Maang Tikka</option>
                                <option value="vanki">Vanki</option>
                                <option value="bridal">Bridal Set</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Upload Image</label>
                            <input type="file" id="prod-image" accept="image/*" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="prod-desc" rows="2" placeholder="Short product description..."
                            required></textarea>
                    </div>

                    <div class="form-toggle">
                        <label class="switch">
                            <input type="checkbox" id="prod-visible" checked>
                            <span class="slider round"></span>
                        </label>
                        <span>Visible on Website</span>
                    </div>

                    <button type="submit" class="btn btn-gold" id="btn-add-product">Add Product</button>
                </form>
            </section>

            <!-- PRODUCTS LIST -->
            <section class="admin-section">
                <h3>Manage Products</h3>
                <div class="table-container">
                    <table class="products-table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="products-tbody">
                            <!-- Dummy Data for Preview -->
                            <tr>
                                <td>
                                    <div class="tbl-img"></div>
                                </td>
                                <td>Peacock Jhumka</td>
                                <td>₹1,820</td>
                                <td><span class="badge active">Visible</span></td>
                                <td><button class="btn-edit">Edit</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="admin.js"></script>
</body>

</html>
